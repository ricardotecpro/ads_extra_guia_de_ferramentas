      - 'Aula 01 - Intro ao Ecossistema': aulas/aula-01.md
      - 'Aula 02 - Gestão de Projetos': aulas/aula-02.md
      - 'Aula 03 - Ambiente de Dev': aulas/aula-03.md
      - 'Aula 04 - Git Fundamentos': aulas/aula-04.md
    - Módulo 2 – Versão e Dados:
      - 'Aula 05 - Plataformas Git': aulas/aula-05.md
      - 'Aula 06 - DB Relacional': aulas/aula-06.md
      - 'Aula 07 - NoSQL e Cache': aulas/aula-07.md
      - 'Aula 08 - Frameworks de Teste': aulas/aula-08.md
    - Módulo 3 – API e Qualidade:
      - 'Aula 09 - Ferramentas de API': aulas/aula-09.md
      - 'Aula 10 - Qualidade de Código': aulas/aula-10.md
      - 'Aula 11 - CI/CD Moderno': aulas/aula-11.md
      - 'Aula 12 - Automação e IaC': aulas/aula-12.md
    - Módulo 4 – Infra e Docker:
      - 'Aula 13 - Docker e Compose': aulas/aula-13.md
      - 'Aula 14 - K8s e Runners': aulas/aula-14.md
      - 'Aula 15 - Comunicação': aulas/aula-15.md
    - Módulo 5 – Design e UI:
      - 'Aula 16 - Design e Figma': aulas/aula-16.md
  - Materiais:
      - materiais.md
      - Slides:
          - slides/index.md
          - 'Slide 01 - Ecossistema': slides/slide-01.html
          - 'Slide 02 - Gestão': slides/slide-02.html
          - 'Slide 03 - Ambiente': slides/slide-03.html
          - 'Slide 04 - Git Fundamentos': slides/slide-04.html
          - 'Slide 05 - Plataformas Git': slides/slide-05.html
          - 'Slide 06 - DB Relacional': slides/slide-06.html
          - 'Slide 07 - NoSQL e Cache': slides/slide-07.html
          - 'Slide 08 - Testes': slides/slide-08.html
          - 'Slide 09 - API': slides/slide-09.html
          - 'Slide 10 - Qualidade': slides/slide-10.html
          - 'Slide 11 - CI/CD': slides/slide-11.html
          - 'Slide 12 - Automação': slides/slide-12.html
          - 'Slide 13 - Docker': slides/slide-13.html
          - 'Slide 14 - K8s Runners': slides/slide-14.html
          - 'Slide 15 - Comunicação': slides/slide-15.html
          - 'Slide 16 - Design Figma': slides/slide-16.html
      - Exercícios:
          - exercicios/index.md
      - Quizzes:
          - quizzes/index.md
      - Projetos:
          - projetos/index.md
      - Configuração:
          - setups/index.md
          - 'Windows': setups/setup-01.md
          - 'Linux': setups/setup-02.md
          - 'macOS': setups/setup-03.md
  - Impressão: print_page.md

